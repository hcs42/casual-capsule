name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run dclint
        uses: docker-compose-linter/dclint-github-action@v1.6.0
        with:
          path: .
          recursive: true

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          recursive: true

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  tests:
    name: tests
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run all test suites
        env:
          CAPSULE_HOST_WORKDIR: ${{ github.workspace }}
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tests/test_all.sh

      - name: Upload e2e log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: _build/tests/**/suite_e2e.log
          if-no-files-found: warn
          archive: false

  compose-build:
    name: compose-build
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image via Docker Compose
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: docker compose -f compose.yml build cli
